<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>BurnCut — Intro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0A0A0A;
    color: #FFFFFF;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .wrap {
    text-align: center;
    padding: 0 64px;
  }
  .logo {
    font-size: 96px;
    font-weight: 800;
    letter-spacing: -2px;
    margin-bottom: 24px;
    color: #FFFFFF;
  }
  .accent { color: #FF4D1C; }
  .tagline {
    font-size: 32px;
    font-weight: 400;
    color: #B0B0B0;
    margin-bottom: 48px;
  }
  .url {
    font-size: 24px;
    color: #FF4D1C;
    font-weight: 500;
    letter-spacing: 1px;
  }
  .badge {
    margin-top: 64px;
    display: inline-block;
    padding: 12px 28px;
    border: 1px solid #333;
    border-radius: 999px;
    font-size: 18px;
    color: #888;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Burn<span class="accent">Cut</span></div>
    <div class="tagline">AI Short-Form Video Editor</div>
    <div class="url">burncut.kr</div>
    <div class="badge">OAuth Verification Demo</div>
  </div>
</body>
</html>
